<!DOCTYPE html>

<title>Gabrielle Rul</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #fff;
    color: rgba(0,0,0,0.85);
    font-family: 'Space Grotesk', Helvetica, Arial, sans-serif;
  }

  /* ---- Layout ---- */
  .layout {
    display: flex;
    height: 100vh;
  }

  /* ---- Left sidebar ---- */
  .sidebar {
    width: 28%;
    min-width: 220px;
    max-width: 300px;
    flex-shrink: 0;
    padding: 36px 32px 36px 36px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    z-index: 10;
  }

  .sidebar-top { display: flex; flex-direction: column; gap: 10px; }

  h1 {
    font-size: 3.8rem;
    font-weight: 400;
    line-height: 1.0;
    letter-spacing: -0.025em;
  }

  .sidebar-contact {
    font-size: 0.8rem;
    font-weight: 300;
    color: rgba(0,70,171,0.85);
  }
  .sidebar-contact a {
    color: rgba(0,70,171,0.85);
    text-decoration: none;
  }
  .sidebar-contact a:hover { text-decoration: underline; }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 4px;
  }
  .nav-link {
    font-size: 0.8rem;
    font-weight: 300;
    color: rgba(0,70,171,0.85);
    text-decoration: none;
    display: inline-block;
  }
  .nav-link:hover { text-decoration: underline; }

  /* ---- Gallery ---- */
  .gallery {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    align-items: stretch;
    gap: 6px;
    padding: 0;
    cursor: grab;
    user-select: none;
    -webkit-overflow-scrolling: touch;
  }
  .gallery::-webkit-scrollbar { display: none; }
  .gallery.grabbing { cursor: grabbing; }

  .gallery-img {
    height: 100vh;
    width: auto;
    flex-shrink: 0;
    display: block;
    object-fit: cover;
    pointer-events: none;
  }

  /* ---- Scroll hint ---- */
  .scroll-hint {
    position: fixed;
    bottom: 28px;
    right: 32px;
    font-size: 0.68rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: rgba(0,0,0,0.28);
    pointer-events: none;
    animation: hint-fade 1s ease-out 2.5s forwards;
    opacity: 1;
  }
  @keyframes hint-fade {
    to { opacity: 0; }
  }

  /* ---- Mobile ---- */
  @media (max-width: 680px) {
    html, body { overflow: auto; }
    .layout { flex-direction: column; height: auto; }
    .sidebar {
      width: 100%; max-width: 100%;
      padding: 28px 24px 20px;
    }
    h1 { font-size: 4rem; }
    .gallery {
      width: 100%; height: 75vw;
      overflow-x: auto; overflow-y: hidden;
      cursor: grab;
    }
    .gallery-img { height: 100%; width: auto; }
  }
</style>
</head>

  <!-- Horizontal photo gallery -->

<div class="scroll-hint">scroll →</div>

<script>
  const gallery = document.getElementById('gallery');
  let isDown = false, startX, scrollLeft;

  gallery.addEventListener('mousedown', e => {
    isDown = true;
    gallery.classList.add('grabbing');
    startX = e.pageX - gallery.offsetLeft;
    scrollLeft = gallery.scrollLeft;
  });
  gallery.addEventListener('mouseleave', () => { isDown = false; gallery.classList.remove('grabbing'); });
  gallery.addEventListener('mouseup',    () => { isDown = false; gallery.classList.remove('grabbing'); });
  gallery.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - gallery.offsetLeft;
    gallery.scrollLeft = scrollLeft - (x - startX) * 1.4;
  });

  // Scroll wheel → horizontal
  gallery.addEventListener('wheel', e => {
    e.preventDefault();
    gallery.scrollLeft += e.deltaY + e.deltaX;
  }, { passive: false });
</script>
</body>
</html>
