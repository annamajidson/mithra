  .nav-link {
    font-size: 0.8rem;
    font-weight: 300;
    color: rgba(0,70,171,0.85);
    text-decoration: none;
  }
  .nav-link:hover { text-decoration: underline; }
  .nav-link.active { color: rgba(0,0,0,0.85); }

  .main {
    flex: 1;
    padding: 36px 64px 100px 52px;
    max-width: 740px;
  }

  .video-wrap {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    margin-bottom: 48px;
  }
  .video-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  @media (max-width: 680px) {
    .layout { flex-direction: column; }
    .sidebar {
      width: 100%; max-width: 100%;
      padding: 28px 24px 20px;
      position: relative; height: auto;
